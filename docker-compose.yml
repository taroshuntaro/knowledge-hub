services:
  db:
    build: ./docker/db
    environment:
      POSTGRES_USER: khub
      POSTGRES_PASSWORD: khub
      POSTGRES_DB: khub
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U khub"]
      interval: 5s
      timeout: 3s
      retries: 10
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
  # 起動時に画像バケットを作成する使い捨てジョブ（S3_BUCKET と揃える）
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/knowledge-hub
      "
  # 開発用 IdP（手動 SSO 検証用）。普段は起動しない: docker compose --profile idp up -d
  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    profiles: ["idp"]
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin        # dev 専用
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin        # dev 専用
    ports:
      - "8080:8080"
    volumes:
      - ./docker/keycloak/realm.json:/opt/keycloak/data/import/realm.json:ro
volumes:
  db-data: {}
  minio-data: {}
